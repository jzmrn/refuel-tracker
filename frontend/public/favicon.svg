<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#3B82F6"/>
  
  <!-- Chart bars (scaled down ChartIcon) -->
  <g fill="white">
    <!-- Left bar (shortest - 8px) -->
    <rect x="5" y="20" width="5" height="8" rx="1"/>
    
    <!-- Middle bar (medium - 14px) -->
    <rect x="13.5" y="14" width="5" height="14" rx="1"/>
    
    <!-- Right bar (tallest - 20px) -->
    <rect x="22" y="8" width="5" height="20" rx="1"/>
  </g>
</svg>
