services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    env_file:
      - ./backend/.env
    environment:
      - DATA_PATH=/app/data
      - BACKUP_PATH=/app/backups
      - PYTHONPATH=/app
      - DOCKER_BUILDKIT=1
      - BUILDKIT_PROGRESS=plain
      - ENVIRONMENT=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s

  frontend:
    build:
      context: ./frontend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - DOCKER_BUILDKIT=1
      - BUILDKIT_PROGRESS=plain
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
    driver: local
  backups:
    driver: local

networks:
  default:
    name: personal-data-tracker
