name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: docker-release
    strategy:
      matrix:
        include:
          - name: dagster
            context: .
            dockerfile: ./analytics/Dockerfile
            image: jzmrn/refuel-tracker-dagster
          - name: backend
            context: .
            dockerfile: ./backend/Dockerfile
            image: jzmrn/refuel-tracker-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: jzmrn/refuel-tracker-frontend

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.image }}:temp
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          outputs: type=docker,dest=/tmp/${{ matrix.name }}-image.tar

      - name: Upload ${{ matrix.name }} image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.name }}
          path: /tmp/${{ matrix.name }}-image.tar
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build
    environment: docker-release
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_major_version: ${{ steps.release.outputs.new_release_major_version }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js environment
        uses: actions/setup-node@v3.8.1
        with:
          node-version: 20.x

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-images:
    runs-on: ubuntu-latest
    needs: [build, release]
    if: needs.release.outputs.new_release_published == 'true'
    environment: docker-release
    strategy:
      matrix:
        include:
          - name: dagster
            image: jzmrn/refuel-tracker-dagster
          - name: backend
            image: jzmrn/refuel-tracker-backend
          - name: frontend
            image: jzmrn/refuel-tracker-frontend

    steps:
      - name: Download ${{ matrix.name }} image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ matrix.name }}
          path: /tmp

      - name: Load ${{ matrix.name }} image
        run: docker load --input /tmp/${{ matrix.name }}-image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Tag and push ${{ matrix.name }} image
        run: |
          docker tag ${{ matrix.image }}:temp ${{ matrix.image }}:${{ needs.release.outputs.new_release_version }}
          docker tag ${{ matrix.image }}:temp ${{ matrix.image }}:${{ needs.release.outputs.new_release_major_version }}-latest
          docker tag ${{ matrix.image }}:temp ${{ matrix.image }}:latest
          docker push ${{ matrix.image }}:${{ needs.release.outputs.new_release_version }}
          docker push ${{ matrix.image }}:${{ needs.release.outputs.new_release_major_version }}-latest
          docker push ${{ matrix.image }}:latest
