services:
  envoy:
    image: envoyproxy/envoy:v1.36-latest
    ports:
      - "8080:8080"
      - "9902:9901" # Admin interface
    volumes:
      - ./config/out/analytics/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./config/out/analytics/envoy-token-secret.yaml:/etc/envoy/token-secret.yaml:ro
      - ./config/out/analytics/envoy-hmac-secret.yaml:/etc/envoy/hmac-secret.yaml:ro
    depends_on:
      - dagster
    restart: unless-stopped

  dagster:
    build:
      context: . # Use the root context to access python packages stored in /lib
      dockerfile: analytics/Dockerfile
    expose:
      - "3000"
    env_file:
      - analytics/.env
    volumes:
      - ./data:/app/data
      - ./analytics/tmp/storage:/app/storage
      - ./analytics/tmp/logs:/app/logs
      - ./analytics/tmp/artifacts:/app/artifacts
    environment:
      - DATA_OUTPUT_PATH=/app/data
    restart: unless-stopped

volumes:
  data:
    driver: local

networks:
  default:
    name: analytics
